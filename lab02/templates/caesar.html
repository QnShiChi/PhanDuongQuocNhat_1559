<!DOCTYPE html>
<html lang="en">
<head>
    <title>Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container">
        <ul class="nav nav-pills nav-fill mt-4 mb-4">
            <li class="nav-item">
                <a class="nav-link active" href="/caesar">Caesar</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/vigenere">Vigenere</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/railfence">Railfence</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/playfair">Playfair</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/transposition">Transposition</a>
            </li>
        </ul>
        <table class="table">
            <tr>
                <td style="text-align: center; font-weight: bold; font-size: 25px;">CAESAR CIPHER</td>
            </tr>

            <tr>
                <td style="font-weight: bold; color: blue">ENCRYPTION</td>
            </tr>
            <tr>
                <td>
                    <form method="POST" action="/caesar/encrypt">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                name="inputPlainText" 
                                placeholder="Input Plain Text" 
                                value="{{ plain_text if plain_text else '' }}"
                                required 
                                autofocus
                            />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input 
                                type="number" 
                                class="form-control" 
                                name="inputKeyPlain" 
                                placeholder="Input Key" 
                                value="{{ encrypt_key if encrypt_key else '' }}"
                                required
                            />
                        </div>

                        <button type="submit" class="btn btn-primary">Encrypt</button>

                        <div class="mb-3 mt-3">
                            <label class="form-label">Kết quả mã hóa:</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                value="{{ encrypted_text if encrypted_text else '' }}" 
                                readonly
                            />
                        </div>
                    </form>
                </td>
            </tr>

            <tr>
                <td style="font-weight: bold; color: blue">DECRYPTION</td>
            </tr>
            <tr>
                <td>
                    <form method="POST" action="/caesar/decrypt">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                name="inputCipherText" 
                                placeholder="Input Cipher Text" 
                                value="{{ cipher_text if cipher_text else '' }}"
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input 
                                type="number" 
                                class="form-control" 
                                name="inputKeyCipher" 
                                placeholder="Input Key" 
                                value="{{ decrypt_key if decrypt_key else '' }}"
                                required
                            />
                        </div>

                        <button type="submit" class="btn btn-success">Decrypt</button>

                        <div class="mb-3 mt-3">
                            <label class="form-label">Kết quả giải mã:</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                value="{{ decrypted_text if decrypted_text else '' }}" 
                                readonly
                            />
                        </div>
                    </form>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
